<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Jost', sans-serif;
    background: #f7f3ee;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .card {
    width: 400px;
    background: #ffffff;
    border-radius: 20px;
    padding: 36px 40px 36px;
    box-shadow: 0 4px 40px rgba(180, 140, 80, 0.1);
    position: relative;
    animation: rise 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 40px; right: 40px;
    height: 1.5px;
    border-radius: 0 0 2px 2px;
    background: linear-gradient(90deg, transparent, #ddb97a, transparent);
  }

  .illus-area {
    width: 100%;
    height: 140px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    background: #fdf8f2;
    position: relative;
    overflow: hidden;
  }

  .illus-area::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #e0c49a 1px, transparent 1px);
    background-size: 18px 18px;
    opacity: 0.35;
  }

  .illus-svg { position: relative; z-index: 1; }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #c49a6c;
    font-weight: 500;
    margin-bottom: 8px;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 25px;
    font-weight: 300;
    color: #2d1a24;
    line-height: 1.3;
    margin-bottom: 10px;
  }

  .desc {
    font-size: 13px;
    color: #a08060;
    line-height: 1.7;
    font-weight: 300;
    margin-bottom: 26px;
  }

  .session {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 14px;
    background: #fdf9f5;
    border-radius: 10px;
    margin-bottom: 24px;
    border: 1px solid #ede0d0;
  }

  .session-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e8c49a, #c49a6c);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; font-weight: 500; flex-shrink: 0;
  }

  .session-name { font-size: 13px; color: #5c3a48; font-weight: 400; }
  .session-role { font-size: 11px; color: #c49a6c; margin-top: 1px; }

  .divider { height: 1px; background: #f0e8d8; margin-bottom: 24px; }

  .btn-row { display: flex; gap: 10px; }

  .btn {
    flex: 1; height: 44px;
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 13px; font-weight: 400;
    letter-spacing: 0.5px;
    cursor: pointer; border: none;
    transition: all 0.2s ease;
  }

  .btn-ghost {
    background: transparent; color: #b09070;
    border: 1px solid #e5d5c0;
  }
  .btn-ghost:hover { background: #fdf5ec; border-color: #c4a070; color: #806040; }

  .btn-confirm { background: #c49a6c; color: #fff; letter-spacing: 0.8px; }
  .btn-confirm:hover { background: #b08a5c; }

  .close {
    position: absolute; top: 18px; right: 20px;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #d0b898; font-size: 18px;
    border-radius: 50%; transition: all 0.2s;
    border: none; background: none;
  }
  .close:hover { color: #806040; background: #fdf5ec; }

  @keyframes shimmer {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1; }
  }
  .shimmer { animation: shimmer 2.5s ease-in-out infinite; }
</style>
</head>
<body>

<div class="card">
  <button class="close">×</button>

  <div class="illus-area">

      <g class="shimmer">
        <path d="M42 52 L43 55 L46 56 L43 57 L42 60 L41 57 L38 56 L41 55 Z" fill="#d4a060" opacity="0.55" transform="scale(0.65) translate(20, 18)"/>
      </g>
      <g class="shimmer" style="animation-delay:0.8s">
        <path d="M178 38 L179 41 L182 42 L179 43 L178 46 L177 43 L174 42 L177 41 Z" fill="#c49a6c" opacity="0.5" transform="scale(0.6)"/>
      </g>
      <g class="shimmer" style="animation-delay:1.6s">
        <path d="M60 35 L61 37 L63 38 L61 39 L60 41 L59 39 L57 38 L59 37 Z" fill="#e8c490" opacity="0.5" transform="scale(0.55)"/>
      </g>
    </svg>
  </div>

  <p class="eyebrow">Keluar Panel Admin</p>
  <h2 class="title">Akhiri sesi<br><em>Administrator?</em></h2>
  <p class="desc">Pastikan seluruh perubahan telah disimpan sebelum keluar. Sesi administrator akan berakhir sepenuhnya.</p>

  <div class="session">
    <div class="session-avatar">A</div>
    <div>
      <div class="session-name">Super Admin</div>
      <div class="session-role">Administrator</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button class="btn btn-ghost">Batalkan</button>
    <button class="btn btn-confirm">Ya, Keluar</button>
  </div>
</div>

</body>
</html>
